name: CI
on:
  pull_request:
  release:
    types:
    - published
  push:
    tags:
    - '*'
    branches:
    - main

env:
  LLVM_VERSION: 19.1.0
  VERBOSE: 1

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false

      # Recommendations:
      #   * support at least 2 operating systems
      #   * support at least 2 compilers
      #   * make sure all supported configurations for your project are built
      #
      # Disable/enable builds in this list to meet the above recommendations
      # and your own projects needs
      matrix:
        os:
          - ubuntu-24.04
        compiler:
          - llvm-19.1.0
          - gcc-13
        generator:
          - Ninja Multi-Config
        build-type:
          - Release
          - Debug
        packaging-maintainer-mode:
          - ON
        build_shared:
          - OFF

        include:
          # This exists solely to make sure a non-multiconfig build works
          - os: ubuntu-20.04
            compiler: gcc-13
            generator: Unix Makefiles
            build-type: Debug
            packaging-maintainer-mode: On
            enable_ipo: Off

    steps:
      - name: Check for llvm version mismatches
        if: ${{ contains(matrix.compiler, 'llvm') && !contains(matrix.compiler, env.LLVM_VERSION) }}
        uses: actions/github-script@v7
        with:
          script: |
            core.setFailed('There is a mismatch between configured llvm compiler and clang-tidy version chosen')

      - uses: actions/checkout@v4

      - name: Setup Cache
        uses: ./.github/actions/setup-cache
        with:
          compiler: ${{ matrix.compiler }}
          build-type: ${{ matrix.build-type }}
          packaging-maintainer-mode: ${{ matrix.packaging-maintainer-mode }}
          generator: ${{ matrix.generator }}

      - name: Project Name
        uses: cardinalby/export-env-action@v2
        with:
          envFile: .github/constants.env

      - name: Setup CPP
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}
          vcvarsall: false
          cmake: true
          ninja: true
          vcpkg: false
          ccache: true
          clangtidy: ${{ env.LLVM_VERSION }}
          cppcheck: true
          gcovr: false
          opencppcoverage: true

      - name: Configure CMake
        run: |
          cmake \
            -S . \
            -B ./build \
            -G "${{matrix.generator}}" \
            -D${{ env.PROJECT_NAME }}_ENABLE_IPO=${{matrix.enable_ipo }} \
            -DCMAKE_BUILD_TYPE:STRING=${{matrix.build-type}} \
            -D${{ env.PROJECT_NAME }}_PACKAGING_MAINTAINER_MODE:BOOL=${{matrix.packaging-maintainer-mode}} \
            -D${{ env.PROJECT_NAME }}_ENABLE_COVERAGE:BOOL=${{ matrix.build-type == 'Debug' }} \
            -DGIT_SHA:STRING=${{ github.sha }}

      - name: Build
        # Execute the build.  You can specify a specific target with "--target <NAME>"
        run: |
          cmake \
            --build ./build \
            --config ${{matrix.build-type}}

      - name: Test
        working-directory: ./build
        # Execute tests defined by the CMake configuration.
        # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
        run: |
          ctest -C ${{matrix.build-type}}

      - name: CPack
        if: matrix.package_generator != ''
        working-directory: ./build
        run: |
          cpack \
            -C ${{matrix.build-type}} \
            -G ${{matrix.package_generator}}

      - name: Publish Tagged Release
        uses: softprops/action-gh-release@v2
        if: ${{ startsWith(github.ref, 'refs/tags/') && matrix.package_generator != '' }}
        with:
          files: |
            build/*-*${{ matrix.build-type }}*-*.*

      - name: Publish to codecov
        uses: codecov/codecov-action@v5
        with:
          flags: ${{ runner.os }}
          name: ${{ runner.os }}-coverage
          files: ./build/coverage.xml
